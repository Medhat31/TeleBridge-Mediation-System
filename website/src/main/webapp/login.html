<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TeleBridge</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    
    <div class="login-container">
        <div class="glass-panel login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h2 class="login-title">Admin Access</h2>
                <p class="login-subtitle">Sign in to manage Mediation Rules & Nodes</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="text" id="emailInput" class="form-control" placeholder="admin@telebridge.local">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="passwordInput" class="form-control" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Sign In
                </button>

                <a href="index.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Back to Home
                </a>
            </form>
        </div>
    </div>

    <!-- API Client & Login Script -->
    <script src="js/api.js?v=5"></script>
    <script src="js/ui.js?v=5"></script>
    <script src="js/login.js?v=5"></script>
</body>
</html>
