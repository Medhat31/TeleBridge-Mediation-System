# ========================================
# TeleBridge Mediation Engine Configuration
# ========================================
# All properties can be overridden by environment variables.
# Convention: replace dots with underscores and uppercase.
# Example: engine.poll.interval.seconds -> ENGINE_POLL_INTERVAL_SECONDS

# --- Workspace Paths ---
# When running in Docker, override with WORKSPACE_ROOT=/app
# workspace.root defaults to parent of user.dir when not set
# workspace.root=/app

# --- Engine Settings ---
engine.poll.interval.seconds=15

# --- Mediation Rules ---
mediation.emergency.numbers=112,122,123,180

# --- Docker ---
docker.network=telebridge-mediation-system_telecom-net

# --- Security ---
security.ssh.strict.host.checking=no
